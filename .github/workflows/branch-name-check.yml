name: Branch Name Check

# Enforces the project's gitflow branch naming convention (see
# memory: branches must be feature/*, release/*, hotfix/*, bugfix/*, or
# support/* — main and develop are the only long-lived branches).
#
# dependabot/* branches are allowed into develop too: Dependabot's branch
# prefix isn't configurable to match gitflow, so it's special-cased here
# instead (target-branch: develop is set in .github/dependabot.yml).

on:
  pull_request:
    types: [opened, reopened, synchronize, edited]
    branches: [main, develop]

# This job only reads github.head_ref/base_ref from the event context -- no
# checkout, no API calls -- so it needs no token access at all.
permissions: {}

jobs:
  check-branch-name:
    name: Validate gitflow branch name
    runs-on: ubuntu-24.04
    steps:
      - name: Validate source and target branch pairing
        env:
          HEAD_REF: ${{ github.head_ref }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          echo "Source branch: $HEAD_REF"
          echo "Target branch: $BASE_REF"

          gitflow_prefix_re='^(feature|bugfix|release|hotfix|support)/[A-Za-z0-9._-]+$'

          if [[ "$BASE_REF" == "main" ]]; then
            # Only release/hotfix/support branches (or develop, on a release
            # finish) may land on main.
            allowed_re='^(release|hotfix|support)/[A-Za-z0-9._-]+$'
            if [[ "$HEAD_REF" == "develop" ]] || [[ "$HEAD_REF" =~ $allowed_re ]]; then
              echo "OK: '$HEAD_REF' is a valid source for a PR into 'main'."
            else
              echo "::error::Branch '$HEAD_REF' is not allowed to target 'main'. Only 'release/*', 'hotfix/*', 'support/*', or 'develop' may open PRs against 'main'."
              exit 1
            fi
          elif [[ "$BASE_REF" == "develop" ]]; then
            # feature/bugfix land on develop; release/hotfix merge back too.
            # dependabot/* is also allowed -- see note above.
            if [[ "$HEAD_REF" =~ $gitflow_prefix_re ]] || [[ "$HEAD_REF" =~ ^dependabot/ ]]; then
              echo "OK: '$HEAD_REF' follows the gitflow naming convention."
            else
              echo "::error::Branch '$HEAD_REF' does not follow the gitflow naming convention. Expected one of: feature/*, bugfix/*, release/*, hotfix/*, support/*, dependabot/*."
              exit 1
            fi
          else
            echo "::error::Unexpected target branch '$BASE_REF'."
            exit 1
          fi
