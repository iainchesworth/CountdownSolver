name: CodeQL (C++)

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan catches new CodeQL query packs even without code changes.
    - cron: "17 3 * * 1"

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (C++)
    runs-on: ubuntu-24.04
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: cpp
          build-mode: manual

      - name: Install CMake 4 + Ninja
        uses: lukka/get-cmake@591817e96fcad43505fb4eae36172462abb3a42e # v4.3.3
        with:
          cmakeVersion: "latest"

      - name: Install GCC 15
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y g++-15

      # Tests are excluded too (not just the Qt app): CMake's post-build
      # catch_discover_tests step runs the ASan-instrumented test binary to
      # enumerate cases, and CodeQL's LD_PRELOAD tracer conflicts with ASan
      # needing to be the first-loaded library, aborting the build.
      - name: Configure (library only, no Qt app or tests)
        run: >
          cmake --preset linux-gcc-debug
          -DCMAKE_CXX_COMPILER=g++-15
          -DCOUNTDOWN_BUILD_APP=OFF
          -DCOUNTDOWN_BUILD_TESTS=OFF

      - name: Build
        run: cmake --build --preset linux-gcc-debug

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          category: "/language:cpp"
