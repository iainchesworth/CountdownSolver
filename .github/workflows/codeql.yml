name: CodeQL (C++)

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan catches new CodeQL query packs even without code changes.
    - cron: "17 3 * * 1"

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (C++)
    runs-on: ubuntu-24.04
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: cpp
          build-mode: manual

      - name: Install CMake 4 + Ninja
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "latest"

      - name: Install GCC 15
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y g++-15

      - name: Configure (library + tests only, no Qt app)
        run: >
          cmake --preset linux-gcc-debug
          -DCMAKE_CXX_COMPILER=g++-15
          -DCOUNTDOWN_BUILD_APP=OFF

      - name: Build
        run: cmake --build --preset linux-gcc-debug

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:cpp"
