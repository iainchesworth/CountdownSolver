name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux (GCC)
            os: ubuntu-24.04
            preset: linux-gcc
          - name: Linux (Clang)
            os: ubuntu-24.04
            preset: linux-clang
          - name: macOS (AppleClang)
            os: macos-14
            preset: macos-clang
          - name: Windows (MSVC)
            os: windows-2025
            preset: windows-msvc

    env:
      # Cache vcpkg build artefacts between runs. The vcpkg provider itself is
      # the vendored deps/vcpkg submodule and is bootstrapped automatically by
      # its CMake toolchain on first configure.
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Enable vcpkg GitHub Actions cache
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      # The GitHub runners ship CMake 3.x; the project (and CMakePresets)
      # require CMake 4. get-cmake installs a matching CMake 4 and Ninja on
      # every OS.
      - name: Install CMake 4 + Ninja
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "4.1.1"

      - name: Set up MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      # COUNTDOWN_BUILD_APP=OFF keeps Qt out of CI: with the app feature
      # disabled, vcpkg installs only Catch2, so the library and full test
      # suite build and run without a lengthy Qt-from-source build.
      - name: Configure
        run: cmake --preset ${{ matrix.preset }} -DCOUNTDOWN_BUILD_APP=OFF

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        run: ctest --preset ${{ matrix.preset }}
