name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    # Jobs flagged experimental (macOS/libc++) may fail without failing the run.
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Toolchain baseline: GCC 15+, Clang 21+, MSVC 14.51+, AppleClang 17+.
          # Anything older lacks the C++23 features used here (deducing this,
          # views::enumerate / stride / zip, ranges::to, std::expected).
          - name: Linux (GCC 15)
            os: ubuntu-24.04
            preset: linux-gcc
            cxx: g++-15
          - name: Linux (Clang 21)
            os: ubuntu-24.04
            preset: linux-clang
            cxx: clang++-21
            # LLVM 21's libc++ implements the C++23 views + std::expected;
            # pairing clang with libstdc++ was unreliable for <expected>.
            cxxflags: "-stdlib=libc++"
          - name: macOS (AppleClang)
            os: macos-15
            preset: macos-clang
            # Needs AppleClang 17+ (Xcode 26); older images ship an older libc++
            # that lacks these views, so keep non-blocking until then.
            experimental: true
          - name: Windows (MSVC)
            os: windows-2025
            preset: windows-msvc

    env:
      # Cache vcpkg build artefacts between runs. The vcpkg provider itself is
      # the vendored deps/vcpkg submodule and is bootstrapped automatically by
      # its CMake toolchain on first configure.
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Enable vcpkg GitHub Actions cache
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      # The GitHub runners ship CMake 3.x; the project (and CMakePresets)
      # require CMake 4. get-cmake installs a matching CMake 4 and Ninja on
      # every OS.
      - name: Install CMake 4 + Ninja
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "latest"

      - name: Install GCC 15 (Linux GCC)
        if: matrix.cxx == 'g++-15'
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y g++-15

      - name: Install Clang 21 + libc++ (Linux Clang)
        if: matrix.cxx == 'clang++-21'
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 21
          sudo apt-get install -y libc++-21-dev libc++abi-21-dev

      - name: Set up MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      # COUNTDOWN_BUILD_APP=OFF keeps Qt out of CI: with the app feature
      # disabled, vcpkg installs only Catch2, so the library and full test
      # suite build and run without a lengthy Qt-from-source build.
      # COUNTDOWN_BUILD_APP=OFF keeps Qt out of CI: with the app feature
      # disabled, vcpkg installs only Catch2.
      - name: Configure
        run: >
          cmake --preset ${{ matrix.preset }} -DCOUNTDOWN_BUILD_APP=OFF
          ${{ matrix.cxx && format('-DCMAKE_CXX_COMPILER={0}', matrix.cxx) || '' }}
          ${{ matrix.cxxflags && format('-DCMAKE_CXX_FLAGS={0}', matrix.cxxflags) || '' }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        run: ctest --preset ${{ matrix.preset }}
