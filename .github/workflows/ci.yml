name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    # Jobs flagged experimental (macOS/libc++) may fail without failing the run.
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # The C++23 features used here (deducing this, views::enumerate /
          # stride / zip, ranges::to) need recent toolchains, so the runners'
          # defaults (GCC 13, AppleClang, libstdc++ 13) are not sufficient.
          - name: Linux (GCC 14)
            os: ubuntu-24.04
            preset: linux-gcc
            apt: g++-14
            cxx: g++-14
          - name: Linux (Clang 18)
            os: ubuntu-24.04
            preset: linux-clang
            # Point clang explicitly at the GCC 14 libstdc++ (its C++23 library).
            apt: clang-18 g++-14 libstdc++-14-dev
            cxx: clang++-18
            cxxflags: "--gcc-install-dir=/usr/lib/gcc/x86_64-linux-gnu/14"
          - name: macOS (LLVM Clang)
            os: macos-14
            preset: macos-clang
            # libc++ only recently implemented these C++23 views; kept
            # non-blocking until the toolchain is fully sorted.
            experimental: true
          - name: Windows (MSVC)
            os: windows-2025
            preset: windows-msvc

    env:
      # Cache vcpkg build artefacts between runs. The vcpkg provider itself is
      # the vendored deps/vcpkg submodule and is bootstrapped automatically by
      # its CMake toolchain on first configure.
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Enable vcpkg GitHub Actions cache
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      # The GitHub runners ship CMake 3.x; the project (and CMakePresets)
      # require CMake 4. get-cmake installs a matching CMake 4 and Ninja on
      # every OS.
      - name: Install CMake 4 + Ninja
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "4.1.1"

      - name: Install compilers (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt }}

      - name: Install LLVM Clang (macOS)
        if: runner.os == 'macOS'
        run: brew install llvm

      - name: Set up MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      # COUNTDOWN_BUILD_APP=OFF keeps Qt out of CI: with the app feature
      # disabled, vcpkg installs only Catch2, so the library and full test
      # suite build and run without a lengthy Qt-from-source build.
      - name: Configure (Linux / Windows)
        if: runner.os != 'macOS'
        run: >
          cmake --preset ${{ matrix.preset }} -DCOUNTDOWN_BUILD_APP=OFF
          ${{ matrix.cxx && format('-DCMAKE_CXX_COMPILER={0}', matrix.cxx) || '' }}
          ${{ matrix.cxxflags && format('-DCMAKE_CXX_FLAGS={0}', matrix.cxxflags) || '' }}

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        # Use Homebrew LLVM's own libc++ (newer than the macOS SDK's) so the
        # C++23 views resolve; -Wno-c2y-extensions silences Catch2's __COUNTER__.
        run: |
          LLVM="$(brew --prefix llvm)"
          cmake --preset ${{ matrix.preset }} -DCOUNTDOWN_BUILD_APP=OFF \
            -DCMAKE_CXX_COMPILER="$LLVM/bin/clang++" \
            -DCMAKE_CXX_FLAGS="-nostdinc++ -isystem $LLVM/include/c++/v1 -Wno-c2y-extensions" \
            -DCMAKE_EXE_LINKER_FLAGS="-L$LLVM/lib/c++ -Wl,-rpath,$LLVM/lib/c++"

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        run: ctest --preset ${{ matrix.preset }}
