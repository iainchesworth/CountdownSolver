name: ClusterFuzzLite PR fuzzing

# See .clusterfuzzlite/{Dockerfile,build.sh,project.yaml} for the build
# integration these actions drive - only countdown::solver (src/lib), not the
# Qt app, is fuzzed. Path-filtered like docs.yml, since a PR that can't touch
# the fuzzed code has nothing new for this to check.
on:
  pull_request:
    branches: ["main", "develop"]
    paths:
      - "src/lib/**"
      - "tests/fuzz/**"
      - "CMakeLists.txt"
      - ".clusterfuzzlite/**"
      - ".github/workflows/cflite_pr.yml"

permissions: read-all

jobs:
  PR:
    runs-on: ubuntu-24.04
    concurrency:
      group: ${{ github.workflow }}-${{ matrix.sanitizer }}-${{ github.ref }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        # Matches this project's existing ASan+UBSan pairing (see
        # cmake/Sanitizers.cmake) rather than just the default 'address'.
        sanitizer: [address, undefined]
    steps:
      - name: Build Fuzzers (${{ matrix.sanitizer }})
        id: build
        uses: google/clusterfuzzlite/actions/build_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          language: c++
          github-token: ${{ secrets.GITHUB_TOKEN }}
          sanitizer: ${{ matrix.sanitizer }}

      - name: Run Fuzzers (${{ matrix.sanitizer }})
        id: run
        uses: google/clusterfuzzlite/actions/run_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fuzz-seconds: 600
          mode: "code-change"
          sanitizer: ${{ matrix.sanitizer }}
          output-sarif: true
