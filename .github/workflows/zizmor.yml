name: Zizmor

# Static analysis of the workflow YAML itself (script injection via
# untrusted inputs, overly-broad permissions, unpinned actions, etc.) —
# complements CodeQL/OSV-Scanner, which only look at application/dependency
# code, not the CI pipeline that builds and releases it.
#
# Visible-only (continue-on-error on the scan step): findings land in the
# Security > Code scanning tab but don't block merges. Dependency Review is
# this repo's one blocking check — see docs/branch-protection.md.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "50 3 * * 1"
  workflow_dispatch:

env:
  ZIZMOR_VERSION: "1.27.0"

permissions: {}

concurrency:
  group: zizmor-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  zizmor:
    name: Analyze workflows
    runs-on: ubuntu-24.04
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Run zizmor
        # continue-on-error: findings should surface in the Security tab,
        # not turn every workflow-touching PR red.
        continue-on-error: true
        run: uvx "zizmor@${ZIZMOR_VERSION}" --format=sarif . > results.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: results.sarif
          category: zizmor
