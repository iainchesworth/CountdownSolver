name: Dependency Review

# Diffs the dependency graph on every PR (vcpkg.json + Actions used in
# .github/workflows) and fails the check if the diff introduces a
# moderate-or-worse known vulnerability. This is the one scanner in this
# repo's security setup that's a required, blocking check — see
# docs/branch-protection.md.

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: dependency-review-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Scan dependency diff
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: on-failure
