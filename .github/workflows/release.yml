name: Release

# Builds redistributable packages (via CPack) and publishes a GitHub Release
# whenever a semver tag is pushed. Tags are expected on 'main', at the end of
# a gitflow release/hotfix finish (see memory: countdown-build-env).

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  package:
    name: Package (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-24.04
            preset: linux-gcc-release
            cxx: g++-15
          - name: macOS
            os: macos-15
            preset: macos-clang-release
          - name: Windows
            os: windows-2025
            preset: windows-msvc-release

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      # See ci.yml for why 'files' + actions/cache replaces the removed x-gha
      # binary caching backend, and why this is set via GITHUB_ENV rather than
      # a job-level env: (the 'runner' context isn't available there).
      - name: Configure vcpkg binary cache
        shell: bash
        run: echo "VCPKG_BINARY_SOURCES=clear;files,${{ runner.temp }}/vcpkg-cache,readwrite" >> "$GITHUB_ENV"

      - name: Cache vcpkg binaries
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ runner.temp }}/vcpkg-cache
          key: vcpkg-binary-cache-${{ matrix.preset }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-binary-cache-${{ matrix.preset }}-

      - name: Install CMake 4 + Ninja
        uses: lukka/get-cmake@591817e96fcad43505fb4eae36172462abb3a42e # v4.3.3
        with:
          cmakeVersion: "latest"

      - name: Install GCC 15 (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y g++-15

      - name: Set up MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0

      - name: Install Qt (prebuilt)
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: "6.8.3"
          cache: true

      - name: Configure
        run: >
          cmake --preset ${{ matrix.preset }}
          -DCMAKE_PREFIX_PATH=${{ env.QT_ROOT_DIR }}
          -DCOUNTDOWN_BUILD_TESTS=OFF
          ${{ matrix.cxx && format('-DCMAKE_CXX_COMPILER={0}', matrix.cxx) || '' }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Package (CPack)
        working-directory: build/${{ matrix.preset }}
        run: cpack

      - name: Upload package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: countdown-${{ matrix.name }}
          path: |
            build/${{ matrix.preset }}/*.zip
            build/${{ matrix.preset }}/*.tar.gz
            build/${{ matrix.preset }}/*.deb
            build/${{ matrix.preset }}/*.exe
            build/${{ matrix.preset }}/*.dmg
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: package
    runs-on: ubuntu-24.04
    steps:
      - name: Download all packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist

      - name: Create release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          draft: true
          generate_release_notes: true
          files: dist/**/*
