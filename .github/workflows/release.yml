name: Release

# Builds redistributable packages (via CPack) and publishes a GitHub Release
# whenever a semver tag is pushed. Tags are expected on 'main', at the end of
# a gitflow release/hotfix finish (see memory: countdown-build-env).

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  package:
    name: Package (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    # Overrides the workflow-level 'contents: write' for this job specifically:
    # it only needs read access to check out the repo, plus 'attestations' and
    # 'id-token' so attest-build-provenance can mint a Sigstore attestation.
    permissions:
      contents: read
      attestations: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-24.04
            preset: linux-gcc-release
            cxx: g++-15
          - name: macOS
            os: macos-15
            preset: macos-clang-release
          - name: Windows
            os: windows-2025
            preset: windows-msvc-release

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      # See ci.yml for why 'files' + actions/cache replaces the removed x-gha
      # binary caching backend, and why this is set via GITHUB_ENV rather than
      # a job-level env: (the 'runner' context isn't available there).
      - name: Configure vcpkg binary cache
        shell: bash
        run: echo "VCPKG_BINARY_SOURCES=clear;files,${{ runner.temp }}/vcpkg-cache,readwrite" >> "$GITHUB_ENV"

      - name: Cache vcpkg binaries
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ runner.temp }}/vcpkg-cache
          key: vcpkg-binary-cache-${{ matrix.preset }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-binary-cache-${{ matrix.preset }}-

      - name: Install CMake 4 + Ninja
        uses: lukka/get-cmake@591817e96fcad43505fb4eae36172462abb3a42e # v4.3.3
        with:
          cmakeVersion: "latest"

      - name: Install GCC 15 (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y g++-15

      # rpmbuild isn't preinstalled on the Ubuntu runner; without it CPack
      # silently skips the RPM generator (see cmake/Packaging.cmake) and we'd
      # only notice by the .rpm being missing from the release.
      - name: Install rpmbuild (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y rpm

      - name: Set up MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0

      - name: Install Qt (prebuilt)
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: "6.8.3"
          cache: true

      - name: Configure
        run: >
          cmake --preset ${{ matrix.preset }}
          -DCMAKE_PREFIX_PATH=${{ env.QT_ROOT_DIR }}
          -DCOUNTDOWN_BUILD_TESTS=OFF
          ${{ matrix.cxx && format('-DCMAKE_CXX_COMPILER={0}', matrix.cxx) || '' }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Package (CPack)
        working-directory: build/${{ matrix.preset }}
        run: cpack

      # Only these six extensions are ever produced (see cmake/Packaging.cmake):
      # ZIP always, plus DragNDrop/.dmg, NSIS/.exe, TGZ/.tar.gz, DEB/.deb,
      # RPM/.rpm depending on platform and which packaging tool was found.
      # DEB/RPM use their own lower-cased package-name convention rather than
      # CPACK_PACKAGE_FILE_NAME, so a single name-prefix glob won't catch
      # them — list extensions explicitly and resolve the real file list once,
      # so the later attestation step gets exact, already-verified paths
      # instead of a glob that might silently match nothing on some platform.
      - name: Generate checksums
        id: checksums
        working-directory: build/${{ matrix.preset }}
        shell: bash
        run: |
          shopt -s nullglob
          files=(*.zip *.tar.gz *.deb *.rpm *.exe *.dmg)
          if [ ${#files[@]} -eq 0 ]; then
            echo "::error::No package files found — did CPack run?" >&2
            exit 1
          fi
          sha256sum "${files[@]}" > SHA256SUMS
          sha512sum "${files[@]}" > SHA512SUMS
          {
            echo "files<<SUBJECT_PATH_EOF"
            printf 'build/${{ matrix.preset }}/%s\n' "${files[@]}"
            echo "SUBJECT_PATH_EOF"
          } >> "$GITHUB_OUTPUT"

      # Keyless build provenance (Sigstore/SLSA) via GitHub's OIDC identity —
      # no signing key to generate or store. Verify a downloaded package with:
      #   gh attestation verify <file> -R iainchesworth/CountdownSolver
      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ steps.checksums.outputs.files }}

      - name: Upload package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: countdown-${{ matrix.name }}
          path: |
            build/${{ matrix.preset }}/*.zip
            build/${{ matrix.preset }}/*.tar.gz
            build/${{ matrix.preset }}/*.deb
            build/${{ matrix.preset }}/*.rpm
            build/${{ matrix.preset }}/*.exe
            build/${{ matrix.preset }}/*.dmg
            build/${{ matrix.preset }}/SHA256SUMS
            build/${{ matrix.preset }}/SHA512SUMS
          if-no-files-found: error

  android-release:
    name: Package (Android arm64-v8a, signed)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      # Fail fast with a clear message rather than silently falling back to
      # an unsigned/debug-signed package if these haven't been set up yet
      # (Settings -> Secrets and variables -> Actions in the repo).
      - name: Verify signing secrets are configured
        shell: bash
        run: |
          missing=()
          [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ] && missing+=(ANDROID_KEYSTORE_BASE64)
          [ -z "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" ] && missing+=(ANDROID_KEYSTORE_PASSWORD)
          [ -z "${{ secrets.ANDROID_KEY_ALIAS }}" ] && missing+=(ANDROID_KEY_ALIAS)
          [ -z "${{ secrets.ANDROID_KEY_PASSWORD }}" ] && missing+=(ANDROID_KEY_PASSWORD)
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets for a signed Android release: ${missing[*]} (see docs/ci.md)" >&2
            exit 1
          fi

      - name: Install JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager --install "ndk;26.1.10909125"

      - name: Install Qt (desktop host kit)
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: "6.8.3"
          dir: ${{ runner.temp }}/qt-host
          cache: true

      - name: Capture host Qt path
        run: echo "COUNTDOWN_QT_HOST_ROOT=${{ env.QT_ROOT_DIR }}" >> "$GITHUB_ENV"

      - name: Install Qt (Android kit)
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: "6.8.3"
          target: android
          arch: android_arm64_v8a
          dir: ${{ runner.temp }}/qt-android
          cache: true

      - name: Capture Android Qt path
        run: echo "COUNTDOWN_QT_ANDROID_ROOT=${{ env.QT_ROOT_DIR }}" >> "$GITHUB_ENV"

      - name: Install CMake 4 + Ninja
        uses: lukka/get-cmake@591817e96fcad43505fb4eae36172462abb3a42e # v4.3.3
        with:
          cmakeVersion: "latest"

      - name: Decode release keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "${{ runner.temp }}/release.keystore"

      - name: Configure
        env:
          QT_HOST_PATH: ${{ env.COUNTDOWN_QT_HOST_ROOT }}
          QT_ANDROID_ROOT: ${{ env.COUNTDOWN_QT_ANDROID_ROOT }}
        run: >
          cmake --preset android-arm64-v8a-release
          -DCMAKE_PREFIX_PATH=${{ env.COUNTDOWN_QT_ANDROID_ROOT }}

      - name: Build
        run: cmake --build --preset android-arm64-v8a-release

      # androiddeployqt's own --sign flag is its documented signing mechanism
      # (keystore + alias + store/key passwords), so no custom Gradle
      # signingConfig override is needed. The deployment-settings JSON path
      # and androiddeployqt's exact CLI surface here are unverified against a
      # real Qt 6.8.3 Android kit (none is installed on this machine) - see
      # docs/ci.md's "genuine unknowns" list; treat a first-run failure here
      # as an expected thing to fix, not a sign the overall approach is wrong.
      - name: Sign and package APK + AAB
        working-directory: build/android-arm64-v8a-release
        run: |
          "${{ env.COUNTDOWN_QT_ANDROID_ROOT }}/bin/androiddeployqt" \
            --input android-countdown_app-deployment-settings.json \
            --output android-build \
            --release --gradle \
            --sign "${{ runner.temp }}/release.keystore" "${{ secrets.ANDROID_KEY_ALIAS }}" \
            --storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            --keypass "${{ secrets.ANDROID_KEY_PASSWORD }}"
          "${{ env.COUNTDOWN_QT_ANDROID_ROOT }}/bin/androiddeployqt" \
            --input android-countdown_app-deployment-settings.json \
            --output android-build \
            --release --gradle --aab \
            --sign "${{ runner.temp }}/release.keystore" "${{ secrets.ANDROID_KEY_ALIAS }}" \
            --storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            --keypass "${{ secrets.ANDROID_KEY_PASSWORD }}"
          mkdir -p ../../dist-android
          find android-build -name "*.apk" -exec cp {} ../../dist-android/CountdownSolver-android-arm64-v8a.apk \;
          find android-build -name "*.aab" -exec cp {} ../../dist-android/CountdownSolver-android-arm64-v8a.aab \;

      - name: Remove decoded keystore
        if: always()
        run: rm -f "${{ runner.temp }}/release.keystore"

      - name: Generate checksums
        id: checksums
        working-directory: dist-android
        shell: bash
        run: |
          shopt -s nullglob
          files=(*.apk *.aab)
          if [ ${#files[@]} -eq 0 ]; then
            echo "::error::No Android package files found — did androiddeployqt run?" >&2
            exit 1
          fi
          sha256sum "${files[@]}" > SHA256SUMS
          sha512sum "${files[@]}" > SHA512SUMS
          {
            echo "files<<SUBJECT_PATH_EOF"
            printf 'dist-android/%s\n' "${files[@]}"
            echo "SUBJECT_PATH_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ steps.checksums.outputs.files }}

      - name: Upload package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: countdown-Android
          path: |
            dist-android/*.apk
            dist-android/*.aab
            dist-android/SHA256SUMS
            dist-android/SHA512SUMS
          if-no-files-found: error

  ios-release:
    name: Package (iOS, ad-hoc signed)
    runs-on: macos-15
    permissions:
      contents: read
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      - name: Verify signing secrets are configured
        shell: bash
        run: |
          missing=()
          [ -z "${{ secrets.IOS_DIST_CERTIFICATE_BASE64 }}" ] && missing+=(IOS_DIST_CERTIFICATE_BASE64)
          [ -z "${{ secrets.IOS_DIST_CERTIFICATE_PASSWORD }}" ] && missing+=(IOS_DIST_CERTIFICATE_PASSWORD)
          [ -z "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" ] && missing+=(IOS_PROVISIONING_PROFILE_BASE64)
          [ -z "${{ secrets.APPLE_TEAM_ID }}" ] && missing+=(APPLE_TEAM_ID)
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets for a signed iOS release: ${missing[*]} (see docs/ci.md)" >&2
            exit 1
          fi

      - name: Install Qt (iOS kit)
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: "6.8.3"
          target: ios
          cache: true

      - name: Install CMake 4 + Ninja
        uses: lukka/get-cmake@591817e96fcad43505fb4eae36172462abb3a42e # v4.3.3
        with:
          cmakeVersion: "latest"

      # Standard GitHub Actions pattern: import the distribution cert into a
      # CI-only temporary keychain (never the runner's default login
      # keychain) and install the ad-hoc provisioning profile where Xcode
      # looks for it. Both are removed at the end of the job regardless of
      # outcome (see the cleanup step below).
      - name: Import signing certificate and provisioning profile
        env:
          KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          CERT_PATH="${{ runner.temp }}/dist_cert.p12"
          KEYCHAIN_PATH="${{ runner.temp }}/countdown-release.keychain-db"
          PROFILE_PATH="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_PATH"

          echo "${{ secrets.IOS_DIST_CERTIFICATE_BASE64 }}" | base64 -d > "$CERT_PATH"
          echo "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" | base64 -d > "${{ runner.temp }}/profile.mobileprovision"
          cp "${{ runner.temp }}/profile.mobileprovision" "$PROFILE_PATH/"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "${{ secrets.IOS_DIST_CERTIFICATE_PASSWORD }}" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          echo "COUNTDOWN_KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      # The specifier here assumes the profile's own display name; on the
      # first real run confirm this against the actual profile (unverified -
      # no Apple Developer account/Xcode available on this machine, see
      # docs/ci.md's "genuine unknowns" list).
      # CMAKE_XCODE_GENERATE_SCHEME=ON is required here: `xcodebuild archive`
      # (below) only accepts -scheme, not -target, and CMake's Xcode
      # generator doesn't emit schemes by default.
      - name: Configure (signed, ad-hoc)
        run: >
          cmake --preset ios-release
          -DCMAKE_PREFIX_PATH=${{ env.QT_ROOT_DIR }}
          -DCMAKE_XCODE_GENERATE_SCHEME=ON
          -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_ALLOWED=YES
          -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_REQUIRED=YES
          -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGN_IDENTITY="Apple Distribution"
          -DCMAKE_XCODE_ATTRIBUTE_DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }}
          -DCMAKE_XCODE_ATTRIBUTE_PROVISIONING_PROFILE_SPECIFIER=CountdownSolverAdHoc

      # Archiving needs xcodebuild directly (not `cmake --build`, which for
      # the Xcode generator only maps onto `build`/`install`-style actions,
      # not `archive`). Project name follows the top-level project(CountdownSolver
      # ...) in CMakeLists.txt; unverified against a real Qt-for-iOS + Xcode
      # environment - see docs/ci.md's "genuine unknowns" list.
      - name: Archive
        run: >
          xcodebuild archive
          -project build/ios-release/CountdownSolver.xcodeproj
          -scheme countdown_app
          -configuration Release
          -archivePath build/ios-release/countdown_app.xcarchive
          -destination "generic/platform=iOS"

      - name: Export ad-hoc IPA
        run: |
          cat > "${{ runner.temp }}/ExportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>signingStyle</key>
            <string>manual</string>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath build/ios-release/countdown_app.xcarchive \
            -exportPath dist-ios \
            -exportOptionsPlist "${{ runner.temp }}/ExportOptions.plist"
          mv dist-ios/*.ipa dist-ios/CountdownSolver-ios-adhoc.ipa

      - name: Remove signing keychain and provisioning profile
        if: always()
        run: |
          [ -n "${{ env.COUNTDOWN_KEYCHAIN_PATH }}" ] && security delete-keychain "${{ env.COUNTDOWN_KEYCHAIN_PATH }}" || true
          rm -f "$HOME/Library/MobileDevice/Provisioning Profiles/profile.mobileprovision"

      - name: Generate checksums
        id: checksums
        working-directory: dist-ios
        shell: bash
        run: |
          shopt -s nullglob
          files=(*.ipa)
          if [ ${#files[@]} -eq 0 ]; then
            echo "::error::No iOS package file found — did the export step run?" >&2
            exit 1
          fi
          sha256sum "${files[@]}" > SHA256SUMS
          sha512sum "${files[@]}" > SHA512SUMS
          {
            echo "files<<SUBJECT_PATH_EOF"
            printf 'dist-ios/%s\n' "${files[@]}"
            echo "SUBJECT_PATH_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ steps.checksums.outputs.files }}

      - name: Upload package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: countdown-iOS
          path: |
            dist-ios/*.ipa
            dist-ios/SHA256SUMS
            dist-ios/SHA512SUMS
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: [package, android-release, ios-release]
    runs-on: ubuntu-24.04
    steps:
      - name: Download all packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist

      - name: Create release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          draft: true
          generate_release_notes: true
          files: dist/**/*
