name: Release

# Builds redistributable packages (via CPack) and publishes a GitHub Release
# whenever a semver tag is pushed. Tags are expected on 'main', at the end of
# a gitflow release/hotfix finish (see memory: countdown-build-env).

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  package:
    name: Package (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-24.04
            preset: linux-gcc
            cxx: g++-15
          - name: macOS
            os: macos-15
            preset: macos-clang
          - name: Windows
            os: windows-2025
            preset: windows-msvc-release

    env:
      # See ci.yml for why 'files' + actions/cache replaces the removed x-gha
      # binary caching backend.
      VCPKG_BINARY_SOURCES: "clear;files,${{ runner.temp }}/vcpkg-cache,readwrite"

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache vcpkg binaries
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/vcpkg-cache
          key: vcpkg-binary-cache-${{ matrix.preset }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-binary-cache-${{ matrix.preset }}-

      - name: Install CMake 4 + Ninja
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "latest"

      - name: Install GCC 15 (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y g++-15

      - name: Set up MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt (prebuilt)
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          cache: true

      - name: Configure
        run: >
          cmake --preset ${{ matrix.preset }}
          -DCMAKE_PREFIX_PATH=${{ env.QT_ROOT_DIR }}
          -DCMAKE_BUILD_TYPE=Release
          -DCOUNTDOWN_BUILD_TESTS=OFF
          ${{ matrix.cxx && format('-DCMAKE_CXX_COMPILER={0}', matrix.cxx) || '' }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Package (CPack)
        working-directory: build/${{ matrix.preset }}
        run: cpack

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: countdown-${{ matrix.name }}
          path: |
            build/${{ matrix.preset }}/*.zip
            build/${{ matrix.preset }}/*.tar.gz
            build/${{ matrix.preset }}/*.deb
            build/${{ matrix.preset }}/*.exe
            build/${{ matrix.preset }}/*.dmg
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: package
    runs-on: ubuntu-24.04
    steps:
      - name: Download all packages
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: dist/**/*
