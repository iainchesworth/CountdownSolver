name: Release

# Builds redistributable packages (via CPack) and publishes a GitHub Release
# whenever a semver tag is pushed. Tags are expected on 'main', at the end of
# a gitflow release/hotfix finish (see memory: countdown-build-env).
#
# workflow_dispatch lets the whole packaging pipeline - including the Qt
# dependency check below - be run on demand from any branch, so packaging
# changes can be validated before cutting a real version tag rather than
# discovering a break only once a tag is pushed. Manual runs stop after the
# package job (see the publish job's if:); they never create a GitHub
# Release.

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch: {}

# Minimal at workflow level; 'contents: write' is only granted to the
# publish job below, which is the one that actually needs it.
permissions:
  contents: read

jobs:
  # GitHub Actions doesn't allow the secrets context in a job-level if: at
  # all ("Unrecognized named-value: 'secrets'", confirmed by a real
  # workflow_dispatch attempt against this file - it's a parse error, not
  # just a dispatch-specific restriction, so it would have broken every
  # trigger including a real tag push). secrets IS readable in a step-level
  # env:/run:, so resolve the two gates here and expose them as job outputs,
  # which needs.<job>.outputs.<x> IS a valid job-level if: expression.
  check-secrets:
    name: Check release-signing secrets
    runs-on: ubuntu-24.04
    outputs:
      android: ${{ steps.check.outputs.android }}
      ios: ${{ steps.check.outputs.ios }}
    steps:
      - name: Check which platforms have all their signing secrets configured
        id: check
        env:
          ANDROID_SECRETS_OK: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' && secrets.ANDROID_KEYSTORE_PASSWORD != '' && secrets.ANDROID_KEY_ALIAS != '' && secrets.ANDROID_KEY_PASSWORD != '' }}
          IOS_SECRETS_OK: ${{ secrets.IOS_DIST_CERTIFICATE_BASE64 != '' && secrets.IOS_DIST_CERTIFICATE_PASSWORD != '' && secrets.IOS_PROVISIONING_PROFILE_BASE64 != '' && secrets.APPLE_TEAM_ID != '' && secrets.APPLE_PROVISIONING_PROFILE_NAME != '' }}
        run: |
          echo "android=$ANDROID_SECRETS_OK" >> "$GITHUB_OUTPUT"
          echo "ios=$IOS_SECRETS_OK" >> "$GITHUB_OUTPUT"

  package:
    name: Package (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    # Read-only plus 'attestations' and 'id-token' so attest-build-provenance
    # can mint a Sigstore attestation -- this job never needs to write to the
    # repo, unlike 'publish' below.
    permissions:
      contents: read
      attestations: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-24.04
            preset: linux-gcc-release
            cxx: g++-15
          - name: macOS
            os: macos-15
            preset: macos-clang-release
          - name: Windows
            os: windows-2025
            preset: windows-msvc-release

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
          persist-credentials: false

      # Unlike ci.yml, this job doesn't use the vcpkg binary cache: this
      # workflow builds the artifacts that get attested and released, and a
      # populated-by-an-earlier-run cache is a cache-poisoning vector into a
      # workflow that publishes trusted output. vcpkg builds Catch2 from
      # source instead -- release builds are infrequent enough that the
      # extra time isn't worth that tradeoff.
      - name: Install CMake 4 + Ninja
        uses: lukka/get-cmake@f5b8fbb4d77cec1acc5a5f9f0df4beffaf5d98d9 # v4.3.4
        with:
          cmakeVersion: "latest"

      - name: Install GCC 15 (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y g++-15

      # rpmbuild isn't preinstalled on the Ubuntu runner; without it CPack
      # silently skips the RPM generator (see cmake/Packaging.cmake) and we'd
      # only notice by the .rpm being missing from the release.
      - name: Install rpmbuild (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y rpm

      - name: Set up MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0

      - name: Install Qt (prebuilt)
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: "6.8.3"
          cache: true

      # See ci.yml's Configure step for why matrix values go through env:
      # rather than straight into run:, and why shell: bash is explicit here.
      - name: Configure
        shell: bash
        env:
          CMAKE_PRESET: ${{ matrix.preset }}
          EXTRA_CXX_COMPILER: ${{ matrix.cxx && format('-DCMAKE_CXX_COMPILER={0}', matrix.cxx) || '' }}
        run: >
          cmake --preset "$CMAKE_PRESET"
          -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"
          -DCOUNTDOWN_BUILD_TESTS=OFF
          $EXTRA_CXX_COMPILER

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Package (CPack)
        working-directory: build/${{ matrix.preset }}
        run: cpack

      # Windows/macOS bundle their own private copy of Qt via
      # qt_generate_deploy_app_script (see src/app/CMakeLists.txt); Linux has
      # no such deploy step and instead relies on
      # CPACK_DEBIAN_PACKAGE_SHLIBDEPS / CPACK_RPM_PACKAGE_AUTOREQPROV
      # (cmake/Packaging.cmake) to auto-detect the Qt6 shared libraries the
      # binary links against and record them as a package dependency, so
      # apt/dnf pull Qt in for the user on install. Verify that actually
      # happened rather than assume it: dpkg-shlibdeps/rpmbuild's
      # auto-requires can silently omit a library if it can't map its soname
      # to an owning package - a real risk here since Qt comes from
      # jurplel/install-qt-action's private prebuilt archive, not an
      # apt/dnf-installed package.
      - name: Verify Qt dependency in Linux packages (DEB/RPM)
        if: runner.os == 'Linux'
        working-directory: build/${{ matrix.preset }}
        shell: bash
        run: |
          shopt -s nullglob
          status=0

          for deb in *.deb; do
            depends=$(dpkg-deb -f "$deb" Depends)
            echo "== $deb =="
            echo "Depends: $depends"
            if ! grep -qi 'qt6\|libqt' <<< "$depends"; then
              echo "::error::$deb has no Qt6 dependency in its Depends field" >&2
              status=1
            fi
          done

          for rpm in *.rpm; do
            requires=$(rpm -qp --requires "$rpm")
            echo "== $rpm =="
            echo "$requires"
            if ! grep -qi 'qt6' <<< "$requires"; then
              echo "::error::$rpm has no Qt6 dependency in its Requires list" >&2
              status=1
            fi
          done

          exit $status

      # Only these six extensions are ever produced (see cmake/Packaging.cmake):
      # ZIP always, plus DragNDrop/.dmg, NSIS/.exe, TGZ/.tar.gz, DEB/.deb,
      # RPM/.rpm depending on platform and which packaging tool was found.
      # DEB/RPM use their own lower-cased package-name convention rather than
      # CPACK_PACKAGE_FILE_NAME, so a single name-prefix glob won't catch
      # them — list extensions explicitly and resolve the real file list once,
      # so the later attestation step gets exact, already-verified paths
      # instead of a glob that might silently match nothing on some platform.
      - name: Generate checksums
        id: checksums
        working-directory: build/${{ matrix.preset }}
        shell: bash
        run: |
          shopt -s nullglob
          files=(*.zip *.tar.gz *.deb *.rpm *.exe *.dmg)
          if [ ${#files[@]} -eq 0 ]; then
            echo "::error::No package files found — did CPack run?" >&2
            exit 1
          fi
          sha256sum "${files[@]}" > SHA256SUMS
          sha512sum "${files[@]}" > SHA512SUMS
          {
            echo "files<<SUBJECT_PATH_EOF"
            printf 'build/${{ matrix.preset }}/%s\n' "${files[@]}"
            echo "SUBJECT_PATH_EOF"
          } >> "$GITHUB_OUTPUT"

      # Keyless build provenance (Sigstore/SLSA) via GitHub's OIDC identity —
      # no signing key to generate or store. Verify a downloaded package with:
      #   gh attestation verify <file> -R iainchesworth/CountdownSolver
      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ steps.checksums.outputs.files }}

      - name: Upload package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: countdown-${{ matrix.name }}
          path: |
            build/${{ matrix.preset }}/*.zip
            build/${{ matrix.preset }}/*.tar.gz
            build/${{ matrix.preset }}/*.deb
            build/${{ matrix.preset }}/*.rpm
            build/${{ matrix.preset }}/*.exe
            build/${{ matrix.preset }}/*.dmg
            build/${{ matrix.preset }}/SHA256SUMS
            build/${{ matrix.preset }}/SHA512SUMS
          if-no-files-found: error

  android-release:
    name: Package (Android arm64-v8a, signed)
    needs: check-secrets
    runs-on: ubuntu-24.04
    # Cleanly skipped (not failed) until the four ANDROID_* secrets exist -
    # see docs/ci.md and the check-secrets job above. The internal 'Verify
    # signing secrets' step below is a redundant safety net (catches a
    # partially-configured set), not the primary gate.
    if: needs.check-secrets.outputs.android == 'true'
    permissions:
      contents: read
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
          persist-credentials: false

      # Fail fast with a clear message rather than silently falling back to
      # an unsigned/debug-signed package if these haven't been set up yet
      # (Settings -> Secrets and variables -> Actions in the repo).
      - name: Verify signing secrets are configured
        shell: bash
        run: |
          missing=()
          [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ] && missing+=(ANDROID_KEYSTORE_BASE64)
          [ -z "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" ] && missing+=(ANDROID_KEYSTORE_PASSWORD)
          [ -z "${{ secrets.ANDROID_KEY_ALIAS }}" ] && missing+=(ANDROID_KEY_ALIAS)
          [ -z "${{ secrets.ANDROID_KEY_PASSWORD }}" ] && missing+=(ANDROID_KEY_PASSWORD)
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets for a signed Android release: ${missing[*]} (see docs/ci.md)" >&2
            exit 1
          fi

      - name: Install JDK 17
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Install Android NDK
        run: sdkmanager --install "ndk;26.1.10909125"

      - name: Install Qt (desktop host kit)
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: "6.8.3"
          dir: ${{ runner.temp }}/qt-host
          cache: true

      - name: Capture host Qt path
        run: echo "COUNTDOWN_QT_HOST_ROOT=$QT_ROOT_DIR" >> "$GITHUB_ENV"

      - name: Install Qt (Android kit)
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: "6.8.3"
          target: android
          arch: android_arm64_v8a
          dir: ${{ runner.temp }}/qt-android
          cache: true

      - name: Capture Android Qt path
        run: echo "COUNTDOWN_QT_ANDROID_ROOT=$QT_ROOT_DIR" >> "$GITHUB_ENV"

      - name: Install CMake 4 + Ninja
        uses: lukka/get-cmake@f5b8fbb4d77cec1acc5a5f9f0df4beffaf5d98d9 # v4.3.4
        with:
          cmakeVersion: "latest"

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "${{ runner.temp }}/release.keystore"

      - name: Configure
        env:
          QT_HOST_PATH: ${{ env.COUNTDOWN_QT_HOST_ROOT }}
          QT_ANDROID_ROOT: ${{ env.COUNTDOWN_QT_ANDROID_ROOT }}
        run: >
          cmake --preset android-arm64-v8a-release
          -DCMAKE_PREFIX_PATH=$QT_ANDROID_ROOT

      - name: Build
        run: cmake --build --preset android-arm64-v8a-release

      # androiddeployqt is a host build tool (it drives Gradle on the CI
      # runner) shipped in the desktop Qt kit's bin/, not the Android target
      # kit - confirmed against a real Qt 6.8.3 install ("No such file or
      # directory" against COUNTDOWN_QT_ANDROID_ROOT on a real CI run; it
      # exists at COUNTDOWN_QT_HOST_ROOT/bin/androiddeployqt(6) instead).
      # androiddeployqt's own --sign flag is its documented signing mechanism
      # (keystore + alias + store/key passwords), so no custom Gradle
      # signingConfig override is needed.
      # CMake mirrors the source tree under the build dir, and
      # qt_add_executable(countdownsolver ...) is called from
      # src/app/CMakeLists.txt, so the deployment-settings JSON (and the
      # unsigned android-build/ androiddeployqt already produced once,
      # automatically, as part of the plain "Build" step above) both land
      # under src/app/, not the build root - confirmed on a real CI run
      # ("Cannot read from input file" without the src/app/ prefix).
      - name: Sign and package APK + AAB
        working-directory: build/android-arm64-v8a-release/src/app
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          "$COUNTDOWN_QT_HOST_ROOT/bin/androiddeployqt" \
            --input android-countdownsolver-deployment-settings.json \
            --output android-build \
            --release --gradle \
            --sign "${{ runner.temp }}/release.keystore" "$ANDROID_KEY_ALIAS" \
            --storepass "$ANDROID_KEYSTORE_PASSWORD" \
            --keypass "$ANDROID_KEY_PASSWORD"
          "$COUNTDOWN_QT_HOST_ROOT/bin/androiddeployqt" \
            --input android-countdownsolver-deployment-settings.json \
            --output android-build \
            --release --gradle --aab \
            --sign "${{ runner.temp }}/release.keystore" "$ANDROID_KEY_ALIAS" \
            --storepass "$ANDROID_KEYSTORE_PASSWORD" \
            --keypass "$ANDROID_KEY_PASSWORD"
          # android-build/ contains BOTH android-build-release-unsigned.apk
          # (Qt's own automatic unsigned build, produced during the plain
          # "Build" step above, before this step even runs) and
          # android-build-release-signed.apk (this step's own --sign output)
          # side by side in the same output directory - a bare "*.apk" glob
          # matches both, and since -exec cp runs once per match with no
          # defined match order, it can silently overwrite the signed APK
          # with the unsigned one depending on filesystem traversal order.
          # Confirmed on a real release run: the final artifact was
          # genuinely unsigned (apksigner: "Missing META-INF/MANIFEST.MF")
          # despite CI reporting success, because file-existence/checksum
          # checks alone don't catch this. Match only the signed file by
          # name to fix the root cause, and verify it explicitly below so
          # this class of bug can't silently ship again undetected.
          mkdir -p ../../../../dist-android
          find android-build -name "*-signed.apk" -exec cp {} ../../../../dist-android/CountdownSolver-android-arm64-v8a.apk \;
          find android-build -name "*.aab" -exec cp {} ../../../../dist-android/CountdownSolver-android-arm64-v8a.aab \;

      - name: Verify the APK is actually signed
        run: |
          apksigner=$(find "$ANDROID_HOME/build-tools" -name "apksigner" -type f | sort -V | tail -1)
          if [ -z "$apksigner" ]; then
            echo "::error::apksigner not found under \$ANDROID_HOME/build-tools" >&2
            exit 1
          fi
          if ! "$apksigner" verify --verbose dist-android/CountdownSolver-android-arm64-v8a.apk; then
            echo "::error::Signed APK failed apksigner verification - see docs/ci.md for the known unsigned/signed glob-collision root cause this guards against" >&2
            exit 1
          fi

      - name: Remove decoded keystore
        if: always()
        run: rm -f "${{ runner.temp }}/release.keystore"

      - name: Generate checksums
        id: checksums
        working-directory: dist-android
        shell: bash
        run: |
          shopt -s nullglob
          files=(*.apk *.aab)
          if [ ${#files[@]} -eq 0 ]; then
            echo "::error::No Android package files found — did androiddeployqt run?" >&2
            exit 1
          fi
          sha256sum "${files[@]}" > SHA256SUMS
          sha512sum "${files[@]}" > SHA512SUMS
          {
            echo "files<<SUBJECT_PATH_EOF"
            printf 'dist-android/%s\n' "${files[@]}"
            echo "SUBJECT_PATH_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ steps.checksums.outputs.files }}

      - name: Upload package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: countdown-Android
          path: |
            dist-android/*.apk
            dist-android/*.aab
            dist-android/SHA256SUMS
            dist-android/SHA512SUMS
          if-no-files-found: error

  ios-release:
    name: Package (iOS, ad-hoc signed)
    needs: check-secrets
    runs-on: macos-15
    # Cleanly skipped (not failed) until the Apple Developer Program signing
    # secrets exist - see docs/ci.md and the check-secrets job above. Same
    # rationale as android-release above.
    if: needs.check-secrets.outputs.ios == 'true'
    permissions:
      contents: read
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
          persist-credentials: false

      - name: Verify signing secrets are configured
        shell: bash
        run: |
          missing=()
          [ -z "${{ secrets.IOS_DIST_CERTIFICATE_BASE64 }}" ] && missing+=(IOS_DIST_CERTIFICATE_BASE64)
          [ -z "${{ secrets.IOS_DIST_CERTIFICATE_PASSWORD }}" ] && missing+=(IOS_DIST_CERTIFICATE_PASSWORD)
          [ -z "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" ] && missing+=(IOS_PROVISIONING_PROFILE_BASE64)
          [ -z "${{ secrets.APPLE_TEAM_ID }}" ] && missing+=(APPLE_TEAM_ID)
          [ -z "${{ secrets.APPLE_PROVISIONING_PROFILE_NAME }}" ] && missing+=(APPLE_PROVISIONING_PROFILE_NAME)
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets for a signed iOS release: ${missing[*]} (see docs/ci.md)" >&2
            exit 1
          fi

      - name: Install Qt (iOS kit)
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: "6.8.3"
          target: ios
          cache: true

      - name: Install CMake 4 + Ninja
        uses: lukka/get-cmake@f5b8fbb4d77cec1acc5a5f9f0df4beffaf5d98d9 # v4.3.4
        with:
          cmakeVersion: "latest"

      # Standard GitHub Actions pattern: import the distribution cert into a
      # CI-only temporary keychain (never the runner's default login
      # keychain) and install the ad-hoc provisioning profile where Xcode
      # looks for it. Both are removed at the end of the job regardless of
      # outcome (see the cleanup step below).
      - name: Import signing certificate and provisioning profile
        env:
          KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}
          IOS_DIST_CERTIFICATE_BASE64: ${{ secrets.IOS_DIST_CERTIFICATE_BASE64 }}
          IOS_DIST_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DIST_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          CERT_PATH="${{ runner.temp }}/dist_cert.p12"
          KEYCHAIN_PATH="${{ runner.temp }}/countdown-release.keychain-db"
          PROFILE_PATH="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_PATH"

          echo "$IOS_DIST_CERTIFICATE_BASE64" | base64 -d > "$CERT_PATH"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 -d > "${{ runner.temp }}/profile.mobileprovision"
          cp "${{ runner.temp }}/profile.mobileprovision" "$PROFILE_PATH/"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$IOS_DIST_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          echo "COUNTDOWN_KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      # The specifier must exactly match the provisioning profile's own
      # display name in Apple's system, which we don't control the format
      # of - so it's a secret (APPLE_PROVISIONING_PROFILE_NAME) rather than
      # a hardcoded guess (was "CountdownSolverAdHoc" - assumed you'd name
      # your profile exactly that, which is fragile and undocumented).
      # CMAKE_XCODE_GENERATE_SCHEME=ON is required here: `xcodebuild archive`
      # (below) only accepts -scheme, not -target, and CMake's Xcode
      # generator doesn't emit schemes by default.
      # COUNTDOWN_IOS_SIGNING_TEAM/COUNTDOWN_IOS_SIGNING_PROFILE (read by
      # src/app/CMakeLists.txt's if(IOS) block) scope code signing to just
      # the countdownsolver app target - not project-wide via
      # CMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_ALLOWED/REQUIRED, which forces
      # Xcode to also try signing static libraries and Qt's internal
      # resource-bundle targets that have no bundle identifier and were
      # never meant to be signed (confirmed on a real CI run).
      - name: Configure (signed, ad-hoc)
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PROVISIONING_PROFILE_NAME: ${{ secrets.APPLE_PROVISIONING_PROFILE_NAME }}
        run: >
          cmake --preset ios-release
          -DCMAKE_PREFIX_PATH=$QT_ROOT_DIR
          -DCMAKE_XCODE_GENERATE_SCHEME=ON
          -DCOUNTDOWN_IOS_SIGNING_TEAM=$APPLE_TEAM_ID
          "-DCOUNTDOWN_IOS_SIGNING_PROFILE=$APPLE_PROVISIONING_PROFILE_NAME"

      # Archiving needs xcodebuild directly (not `cmake --build`, which for
      # the Xcode generator only maps onto `build`/`install`-style actions,
      # not `archive`). Project name follows the top-level project(CountdownSolver
      # ...) in CMakeLists.txt; unverified against a real Qt-for-iOS + Xcode
      # environment - see docs/ci.md's "genuine unknowns" list.
      - name: Archive
        run: >
          xcodebuild archive
          -project build/ios-release/CountdownSolver.xcodeproj
          -scheme countdownsolver
          -configuration Release
          -archivePath build/ios-release/countdownsolver.xcarchive
          -destination "generic/platform=iOS"

      - name: Export ad-hoc IPA
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PROVISIONING_PROFILE_NAME: ${{ secrets.APPLE_PROVISIONING_PROFILE_NAME }}
        run: |
          cat > "${{ runner.temp }}/ExportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>org.iainchesworth.countdownsolver</key>
              <string>$APPLE_PROVISIONING_PROFILE_NAME</string>
            </dict>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath build/ios-release/countdownsolver.xcarchive \
            -exportPath dist-ios \
            -exportOptionsPlist "${{ runner.temp }}/ExportOptions.plist"
          mv dist-ios/*.ipa dist-ios/CountdownSolver-ios-adhoc.ipa

      # itms-services (Safari's OTA-install trigger) needs an HTTPS-hosted
      # manifest declaring the bundle id/version and the IPA's own URL - a
      # bare .ipa link can't be installed directly. The IPA's URL is
      # predictable (GitHub release assets are always
      # <repo>/releases/download/<tag>/<filename>) even though the asset
      # itself isn't uploaded until the publish job runs later in this same
      # workflow, so it's safe to reference here before it exists.
      - name: Generate OTA install manifest (manifest.plist)
        env:
          RELEASE_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          cat > dist-ios/manifest.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>items</key>
            <array>
              <dict>
                <key>assets</key>
                <array>
                  <dict>
                    <key>kind</key>
                    <string>software-package</string>
                    <key>url</key>
                    <string>https://github.com/$RELEASE_REPO/releases/download/$RELEASE_TAG/CountdownSolver-ios-adhoc.ipa</string>
                  </dict>
                </array>
                <key>metadata</key>
                <dict>
                  <key>bundle-identifier</key>
                  <string>org.iainchesworth.countdownsolver</string>
                  <key>bundle-version</key>
                  <string>${RELEASE_TAG#v}</string>
                  <key>kind</key>
                  <string>software</string>
                  <key>title</key>
                  <string>CountdownSolver</string>
                </dict>
              </dict>
            </array>
          </dict>
          </plist>
          PLIST

      - name: Remove signing keychain and provisioning profile
        if: always()
        run: |
          [ -n "$COUNTDOWN_KEYCHAIN_PATH" ] && security delete-keychain "$COUNTDOWN_KEYCHAIN_PATH" || true
          rm -f "$HOME/Library/MobileDevice/Provisioning Profiles/profile.mobileprovision"

      - name: Generate checksums
        id: checksums
        working-directory: dist-ios
        shell: bash
        run: |
          shopt -s nullglob
          files=(*.ipa *.plist)
          if [ ${#files[@]} -eq 0 ]; then
            echo "::error::No iOS package file found — did the export step run?" >&2
            exit 1
          fi
          sha256sum "${files[@]}" > SHA256SUMS
          sha512sum "${files[@]}" > SHA512SUMS
          {
            echo "files<<SUBJECT_PATH_EOF"
            printf 'dist-ios/%s\n' "${files[@]}"
            echo "SUBJECT_PATH_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ steps.checksums.outputs.files }}

      - name: Upload package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: countdown-iOS
          path: |
            dist-ios/*.ipa
            dist-ios/*.plist
            dist-ios/SHA256SUMS
            dist-ios/SHA512SUMS
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: [package, android-release, ios-release]
    # Manual (workflow_dispatch) runs are for validating the packaging
    # pipeline only - e.g. that DEB/RPM still declare a Qt dependency, see
    # cmake/Packaging.cmake - and must never create a draft GitHub Release.
    #
    # android-release/ios-release are only *conditionally* skipped (missing
    # signing secrets, see their own if: above) - a skipped needs: job would
    # otherwise skip this one too by default, so always() plus explicit
    # result checks are required: package must have actually succeeded, and
    # neither mobile job may have actually failed (skipped is fine).
    if: |
      always() &&
      github.event_name == 'push' &&
      needs.package.result == 'success' &&
      needs.android-release.result != 'failure' &&
      needs.ios-release.result != 'failure'
    runs-on: ubuntu-24.04
    # 'id-token' is only needed for cosign's keyless signing below (OIDC ->
    # Sigstore Fulcio cert, no key material stored anywhere).
    permissions:
      contents: write
      id-token: write
    steps:
      # Only needed to read CHANGELOG.md below - the package job already
      # checked out the tagged commit for the actual build. Must run BEFORE
      # the artifact download: checkout's default clean: true runs `git
      # clean -ffdx`, which deletes untracked files - including the whole
      # dist/ directory the download step below populates, if it runs
      # after. (That's exactly what broke this job the first time: the
      # later `dist/**/*` glob matched nothing because checkout had already
      # wiped dist/.)
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download all packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist

      # Each platform's package job names its checksum manifest SHA256SUMS/
      # SHA512SUMS identically (see the 'Generate checksums' step above), so
      # downloading all three artifacts leaves three same-named files in
      # separate dist/<artifact>/ subdirectories. Uploading them as release
      # assets by basename then collides - the GitHub Releases API rejects a
      # second asset with a name already taken, which is exactly what broke
      # the very first tagged release (v0.1.0-beta.1) here. Concatenate them
      # into one manifest per algorithm at the dist/ root instead - each
      # entry already carries its own package filename with no path prefix,
      # so combining is safe - and remove the per-platform originals so the
      # later glob only picks up the combined ones.
      - name: Combine per-platform checksums
        run: |
          cat dist/*/SHA256SUMS > dist/SHA256SUMS
          cat dist/*/SHA512SUMS > dist/SHA512SUMS
          rm dist/*/SHA256SUMS dist/*/SHA512SUMS

      # itms-services links only work when tapped from Safari, so the real
      # install path is opening the Release page on the device itself -
      # append working links to the release body rather than only
      # documenting the URL shape. Built from whatever's actually in dist/
      # (mobile signing secrets are optional - see check-secrets above), so
      # a desktop-only release quietly gets no Install section instead of a
      # dead link.
      #
      # The iOS line links to docs/install-ios.html (GitHub Pages), NOT
      # directly to an itms-services:// URL - GitHub's release-notes
      # markdown renderer sanitizes link hrefs to a fixed scheme allowlist
      # and silently drops <a> tags using an unrecognized scheme, which
      # made the very first "Install on iOS" link (v0.3.0-beta.2) render as
      # plain unclickable text. Confirmed by rendering that release's own
      # body through GitHub's markdown API. install-ios.html builds the
      # real itms-services:// link client-side from the ?tag= query
      # parameter instead, and is itself a plain https:// link that
      # survives sanitization.
      - name: Build install links
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_REPO: ${{ github.repository }}
        run: |
          apk=$(find dist -maxdepth 2 -name 'CountdownSolver-android-arm64-v8a.apk')
          manifest=$(find dist -maxdepth 2 -name 'manifest.plist')

          : > /tmp/install-links.md
          if [ -n "$apk" ] || [ -n "$manifest" ]; then
            {
              echo "## Install"
              echo
            } >> /tmp/install-links.md
          fi
          if [ -n "$apk" ]; then
            echo "- **Android**: [Download APK](https://github.com/$RELEASE_REPO/releases/download/$RELEASE_TAG/CountdownSolver-android-arm64-v8a.apk) — allow \"install unknown apps\" for your browser, then open the download. See [Installing](https://iainchesworth.github.io/CountdownSolver/installing/)." >> /tmp/install-links.md
          fi
          if [ -n "$manifest" ]; then
            echo "- **iOS (ad-hoc, pre-registered devices only)**: open this link **in Safari** on the device: [Install on iOS](https://iainchesworth.github.io/CountdownSolver/install-ios.html?tag=$RELEASE_TAG). Only works on a device whose UDID is already in the signing provisioning profile. See [Installing](https://iainchesworth.github.io/CountdownSolver/installing/#ios-ad-hoc-pre-registered-devices-only)." >> /tmp/install-links.md
          fi

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # Keyless signature (Sigstore, via the same GitHub OIDC identity used
      # by attest-build-provenance in the package job above) over the
      # combined checksum manifests - not each package individually, since
      # the manifests already bind every artifact's hash. Must run on the
      # combined manifests, not the per-platform ones: signing before
      # 'Combine per-platform checksums' would produce signatures that no
      # longer validate against the concatenated file actually uploaded.
      # The .sigstore.json bundle extension is what OpenSSF Scorecard's
      # Signed-Releases check looks for in release assets.
      - name: Sign checksum manifests (cosign, keyless)
        run: |
          cosign sign-blob --yes --bundle dist/SHA256SUMS.sigstore.json dist/SHA256SUMS
          cosign sign-blob --yes --bundle dist/SHA512SUMS.sigstore.json dist/SHA512SUMS

      # Release notes should be curated, not a raw PR/commit dump - pull the
      # section matching this tag out of CHANGELOG.md (Keep a Changelog
      # format: "## [x.y.z] - date" headings). Falls back to --generate-notes
      # if the tag has no changelog entry yet, so a release is never blocked
      # on this.
      - name: Extract changelog section for this tag
        id: notes
        run: |
          version="${GITHUB_REF_NAME#v}"
          # Plain substring matching (index), not regex: a dynamic regex
          # built from "\\[" + version + "\\]" silently mismatches under
          # gawk's regex compilation (backslash-escaped brackets don't
          # survive being embedded in a runtime string-to-regex, so
          # "[0.1.0-beta.1]" gets compiled as a *character class* covering
          # a wide ASCII range instead of a literal bracket) - confirmed by
          # testing it swallows unrelated lines and fails to stop at the
          # next version heading. index() sidesteps escaping entirely.
          awk -v hdr="## [$version]" '
            index($0, hdr) == 1 { found=1; next }
            found && index($0, "## [") == 1 { exit }
            found { print }
          ' CHANGELOG.md > /tmp/release-notes.md
          if [ -s /tmp/release-notes.md ]; then
            echo "has_notes=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::No CHANGELOG.md section found for [${version}] - falling back to --generate-notes. Add one before tagging next time so the release gets curated notes instead of a PR dump."
            echo "has_notes=false" >> "$GITHUB_OUTPUT"
          fi

      # gh is preinstalled on GitHub-hosted runners, so a dedicated release
      # action buys nothing here but another third-party dependency (flagged
      # by zizmor's superfluous-actions check) - checkout above makes --repo
      # inferrable, but it's passed explicitly anyway for clarity.
      #
      # Release creation and asset upload are deliberately separate steps.
      # A combined `gh release create <tag> <files...>` silently uploaded
      # only 4 of 9 files on the first real run here - exit 0, no error,
      # just missing assets - so upload is split out and its result is
      # verified explicitly rather than trusted.
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_REPO: ${{ github.repository }}
          HAS_NOTES: ${{ steps.notes.outputs.has_notes }}
        run: |
          if [ "$HAS_NOTES" = "true" ]; then
            cat /tmp/release-notes.md /tmp/install-links.md > /tmp/full-notes.md
            gh release create "$RELEASE_TAG" \
              --repo "$RELEASE_REPO" \
              --draft \
              --prerelease \
              --notes-file /tmp/full-notes.md
          else
            gh release create "$RELEASE_TAG" \
              --repo "$RELEASE_REPO" \
              --draft \
              --prerelease \
              --generate-notes
            # --generate-notes and --notes-file are mutually exclusive, so
            # the install-links section has to be appended after the fact
            # here rather than folded into the create call above.
            if [ -s /tmp/install-links.md ]; then
              body=$(gh release view "$RELEASE_TAG" --repo "$RELEASE_REPO" --json body -q .body)
              { printf '%s\n\n' "$body"; cat /tmp/install-links.md; } > /tmp/full-notes.md
              gh release edit "$RELEASE_TAG" --repo "$RELEASE_REPO" --notes-file /tmp/full-notes.md
            fi
          fi

      # A dist/**/* glob (even with globstar) also matches the artifact
      # directories themselves, not just their contents - `gh release
      # upload` then tries to upload e.g. dist/countdown-Linux/ as a file
      # and fails with "is a directory". find -type f only ever lists
      # actual files, at any depth, with no such ambiguity.
      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_REPO: ${{ github.repository }}
        run: |
          mapfile -t files < <(find dist -type f)
          echo "Uploading ${#files[@]} file(s): ${files[*]}"
          gh release upload "$RELEASE_TAG" "${files[@]}" \
            --repo "$RELEASE_REPO" \
            --clobber

          # gh release create silently dropping assets with no error is
          # exactly what happened above before this was split out - verify
          # the count explicitly instead of trusting a clean exit code.
          uploaded=$(gh release view "$RELEASE_TAG" --repo "$RELEASE_REPO" --json assets --jq '.assets | length')
          if [ "$uploaded" -ne "${#files[@]}" ]; then
            echo "::error::Expected ${#files[@]} release assets, found $uploaded - upload silently dropped some files."
            exit 1
          fi
