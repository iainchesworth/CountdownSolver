name: OSV-Scanner

# Scans vcpkg.json against the OSV database. Right now that's just Catch2
# (test-only feature — see vcpkg.json), but this is meant to scale as real
# runtime dependencies get added, since Dependabot doesn't offer version
# updates for the vcpkg ecosystem the way it does for e.g. npm/pip.
#
# Visible-only by design (fail-on-vuln: false): findings land in the
# Security > Code scanning tab for both the PR and scheduled scans, but
# don't block merges. Dependency Review is this repo's one blocking
# dependency check — see docs/branch-protection.md.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Weekly, offset from the CodeQL cron (Mon 03:17) to avoid runner
    # contention at the same minute.
    - cron: "45 3 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  scan-pr:
    if: github.event_name == 'pull_request'
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
    with:
      fail-on-vuln: false

  scan-scheduled:
    if: github.event_name != 'pull_request'
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
    with:
      fail-on-vuln: false
